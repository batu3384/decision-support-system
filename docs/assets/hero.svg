  <text x="732" y="219" fill="#334155" font-size="20" font-family="Arial, Helvetica, sans-serif">to review branch health, cost pressure,</text>
  <text x="732" y="246" fill="#334155" font-size="20" font-family="Arial, Helvetica, sans-serif">and next-period projections.</text>

  <rect x="700" y="292" width="186" height="126" rx="20" fill="#101F34" stroke="#2A4264"/>
