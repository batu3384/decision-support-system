  <text x="726" y="391" fill="#D2DCE8" font-size="18" font-family="Arial, Helvetica, sans-serif">Costs, rent, profit,</text>
  <text x="726" y="414" fill="#D2DCE8" font-size="18" font-family="Arial, Helvetica, sans-serif">shipment volume</text>

  <rect x="906" y="292" width="186" height="126" rx="20" fill="#101F34" stroke="#2A4264"/>
