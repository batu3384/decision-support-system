  <text x="88" y="180" fill="#F8FAFC" font-size="56" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Decision support for</text>
  <text x="88" y="236" fill="#F8FAFC" font-size="56" font-weight="700" font-family="Georgia, 'Times New Roman', serif">cargo branch operations.</text>
  <text x="88" y="286" fill="#C8D5E3" font-size="24" font-family="Arial, Helvetica, sans-serif">Branch analytics, personnel review, comparison, reporting, and forecasting</text>
  <text x="88" y="320" fill="#C8D5E3" font-size="24" font-family="Arial, Helvetica, sans-serif">built for the Fast Express management workflow.</text>

  <rect x="88" y="384" width="520" height="124" rx="20" fill="#0F1E31" stroke="#243A58"/>
  <text x="118" y="420" fill="#F8FAFC" font-size="20" font-weight="700" font-family="Arial, Helvetica, sans-serif">Operational lanes</text>
  <text x="118" y="455" fill="#D6E1EC" font-size="18" font-family="Arial, Helvetica, sans-serif">Home dashboard  /  Branch drill-down  /  Personnel scoring</text>
  <text x="118" y="486" fill="#D6E1EC" font-size="18" font-family="Arial, Helvetica, sans-serif">Cross-branch comparison  /  Reporting  /  Forecast service</text>

  <rect x="700" y="96" width="392" height="168" rx="22" fill="#FFF8F6"/>
