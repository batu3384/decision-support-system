  <text x="932" y="391" fill="#D2DCE8" font-size="18" font-family="Arial, Helvetica, sans-serif">Linear regression</text>
  <text x="932" y="414" fill="#D2DCE8" font-size="18" font-family="Arial, Helvetica, sans-serif">plus inflation factor</text>

